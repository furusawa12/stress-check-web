<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(~{::title}, ~{::section})">
<head>
    <title>ログイン</title>
</head>
<body>
<section class="content-card form-card">
    <h1>ログイン</h1>
    <div th:if="${param.logout}" class="notice success">ログアウトしました。</div>
    <div th:if="${param.error}" class="notice error">ログインに失敗しました。ユーザー名とパスワードを確認してください。</div>
    <form th:action="@{/login}" method="post" class="auth-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label for="username">ユーザー名</label>
        <input id="username" name="username" type="text" required/>

        <label for="password">パスワード</label>
        <input id="password" name="password" type="password" required/>

        <button type="submit" class="button">ログイン</button>
    </form>
    <p class="hint">初期ユーザー: <code>user</code> / パスワード: <code>password</code></p>
</section>
</body>
</html>
