<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(~{::title}, ~{::section})">
<head>
    <title>ログイン</title>
</head>
<body>
<section class="login-shell">
    <div class="login-columns">
        <div class="login-panel login-panel--info">
            <div class="login-message">
                <p class="login-eyebrow">はじめてみませんか？</p>
                <p class="login-lead">じぶんでできる</p>
                <h1 class="login-title">Mental Care</h1>
            </div>
            <div class="login-links-list">
                <a href="#" class="login-link">
                    <span class="login-link-text">じぶんでできるMentalCareとは？</span>
                    <span class="login-link-arrow" aria-hidden="true">→</span>
                </a>
                <a href="#" class="login-link">
                    <span class="login-link-text">ご利用時の注意事項</span>
                    <span class="login-link-arrow" aria-hidden="true">→</span>
                </a>
                <a href="#" class="login-link">
                    <span class="login-link-text">推進環境のご確認はこちら</span>
                    <span class="login-link-arrow" aria-hidden="true">→</span>
                </a>
            </div>
        </div>
        <div class="login-panel login-panel--form">
            <div class="login-lang">
                <span class="login-lang-icon" aria-hidden="true">
                    <svg viewBox="0 0 20 20">
                        <path d="M10 2a8 8 0 1 0 8 8 8 8 0 0 0-8-8zm5.48 7h-2.2a12.4 12.4 0 0 0-.66-3.02A6.02 6.02 0 0 1 15.48 9zM10 4c.6.79 1.11 1.88 1.4 3H8.6C8.89 5.88 9.4 4.79 10 4zM7.38 9h5.24a11.14 11.14 0 0 1 .1 1 11.14 11.14 0 0 1-.1 1H7.38A11.14 11.14 0 0 1 7.28 10 11.14 11.14 0 0 1 7.38 9zm-.76 2h-2.1a6.02 6.02 0 0 1 2.84 3.02c-.27-.98-.5-1.99-.74-3.02zM4.38 9h2.2c.16-1.03.39-2.04.66-3.02A6.02 6.02 0 0 0 4.38 9zM10 16c-.6-.79-1.11-1.88-1.4-3h2.8C11.11 14.12 10.6 15.21 10 16zm2.3-3.02c.27-.98.5-1.99.65-3.02h2.2a6 6 0 0 1-2.85 3.02zM7.7 9.96c-.15 1.03-.38 2.04-.65 3.02A6 6 0 0 1 4.2 10h2.2a12.4 12.4 0 0 0 .66 3.02z" fill="currentColor"/>
                    </svg>
                </span>
                <span class="login-lang-text">日本語</span>
                <span class="login-lang-caret" aria-hidden="true">▾</span>
            </div>
            <div class="login-card">
                <div class="login-brand">
                    <div class="login-logo" aria-hidden="true">
                        <svg viewBox="0 0 64 64" class="login-logo-mark">
                            <circle cx="32" cy="32" r="30" fill="#6AA884" opacity="0.18"/>
                            <path d="M20 33.5c2.2-1 4.6-1.4 7-1.4 3.2 0 6.5.8 9.2 2.4 2.8 1.5 5 3.7 7 6.2l-4.4 3.5c-1.5-1.8-3.2-3.3-5.2-4.5-1.9-1.1-4-1.7-6.2-1.7-2.1 0-4.2.5-6.1 1.5L20 33.5z" fill="#6AA884"/>
                            <path d="M27 23.5c0-2.5 2-4.5 4.5-4.5s4.5 2 4.5 4.5-2 4.5-4.5 4.5-4.5-2-4.5-4.5z" fill="#6AA884"/>
                        </svg>
                    </div>
                    <div class="login-brand-text">
                        <p class="login-brand-name">Stress Care</p>
                        <p class="login-brand-subtitle">Enterprise solution.</p>
                    </div>
                </div>

                <div th:if="${param.logout}" class="notice success">ログアウトしました。</div>
                <div th:if="${param.error}" class="notice error">ログインに失敗しました。ユーザー名とパスワードを確認してください。</div>

                <form th:action="@{/login}" method="post" class="login-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="input-field">
                        <span class="input-icon" aria-hidden="true">
                            <svg viewBox="0 0 20 20">
                                <path d="M10 10a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm0 2c-3.03 0-6 1.54-6 3.5V17h12v-1.5C16 13.54 13.03 12 10 12z" fill="currentColor"/>
                            </svg>
                        </span>
                        <div class="input-control">
                            <label class="sr-only" for="username">受験者ID</label>
                            <input id="username" name="username" type="text" placeholder="受験者ID" required/>
                        </div>
                    </div>

                    <div class="input-field">
                        <span class="input-icon" aria-hidden="true">
                            <svg viewBox="0 0 20 20">
                                <path d="M14 8V6a4 4 0 1 0-8 0v2H4v10h12V8h-2zm-6 0V6a2 2 0 1 1 4 0v2H8z" fill="currentColor"/>
                            </svg>
                        </span>
                        <div class="input-control">
                            <label class="sr-only" for="password">パスワード</label>
                            <input id="password" name="password" type="password" placeholder="パスワード" required/>
                        </div>
                        <button type="button" class="password-toggle" aria-label="パスワードを表示">
                            <svg viewBox="0 0 20 20" class="eye-icon">
                                <path d="M10 4C5.455 4 1.73 7.11.5 10c1.23 2.89 4.955 6 9.5 6s8.27-3.11 9.5-6C18.27 7.11 14.545 4 10 4zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4a4 4 0 0 1 0 8zm0-2.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z" fill="currentColor"/>
                            </svg>
                        </button>
                    </div>

                    <div class="login-help">
                        <a href="#" class="password-link">パスワードを忘れた方はこちら</a>
                    </div>

                    <button type="submit" class="login-button">ログイン</button>
                </form>
                <p class="hint login-hint">初期ユーザー: <code>user</code> / パスワード: <code>password</code></p>
            </div>
            <div class="login-footer">© 2023 stress care enterprise solutions inc. all rights reserved.</div>
        </div>
    </div>
</section>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        var toggle = document.querySelector('.password-toggle');
        var passwordInput = document.getElementById('password');
        if (toggle && passwordInput) {
            toggle.addEventListener('click', function () {
                var isHidden = passwordInput.getAttribute('type') === 'password';
                passwordInput.setAttribute('type', isHidden ? 'text' : 'password');
                toggle.classList.toggle('is-active', isHidden);
                toggle.setAttribute('aria-label', isHidden ? 'パスワードを隠す' : 'パスワードを表示');
            });
        }
    });
</script>
</body>
</html>
