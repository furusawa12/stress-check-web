<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(~{::title}, ~{::section})">
<head>
    <title>トップページ</title>
</head>
<body>
<section class="content-card">
    <h1 th:text="${headline}">ストレスチェックWebシステム</h1>
    <p>ストレスチェックの回答、結果確認、管理機能を提供するためのベースプロジェクトです。</p>
    <div class="grid">
        <div class="card">
            <h2>ログイン</h2>
            <p>ユーザーはログインしてストレスチェックを実施できます。</p>
            <a class="button" th:href="@{/login}">ログイン画面へ</a>
        </div>
        <div class="card">
            <h2>管理</h2>
            <p>設問管理や集計結果表示などの機能追加を想定しています。</p>
        </div>
    </div>
</section>
</body>
</html>
