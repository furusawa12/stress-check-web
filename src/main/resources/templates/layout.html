<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" th:fragment="layout (title, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:replace="${title}">Stress Check</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body th:classappend="${#strings.endsWith(#httpServletRequest.requestURI, '/login')} ? ' login-page' : ''">
<header class="site-header">
    <div class="branding">
        <span class="site-title">Stress Check</span>
        <span class="site-subtitle">Web System</span>
    </div>
    <nav class="nav-links">
        <a th:href="@{/}">ホーム</a>
        <a th:href="@{/login}">ログイン</a>
    </nav>
</header>

<main class="site-main" th:replace="${content}">
    <section class="content-card">
        <h1>コンテンツ</h1>
        <p>コンテンツを読み込んでいます。</p>
    </section>
</main>

<footer class="site-footer">
    <p>Stress Check Web System</p>
</footer>
</body>
</html>
