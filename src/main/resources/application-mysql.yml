spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/stress_check?characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Tokyo}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false
